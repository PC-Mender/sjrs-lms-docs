<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-labelledby="ftlTitle ftlDesc">
  <title id="ftlTitle">First Time Login Journey</title>
  <desc id="ftlDesc">Illustration of what to do after registration: verify email, complete profile, wait for admin approval, then start using the library.</desc>
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e2e8f0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hlGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fef9c3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fde047;stop-opacity:1" />
    </linearGradient>
    <marker id="ftlArrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>
  <rect width="760" height="300" fill="#ffffff" rx="12" />
  <text x="380" y="40" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#0f172a">First Time Login Journey</text>

  <g transform="translate(60, 90)">
    <rect width="150" height="130" rx="12" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="75" cy="30" r="16" fill="#f59e0b" />
    <text x="75" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">✉</text>
    <text x="75" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a">Verify Email</text>
    <text x="75" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Click the secure link</text>
    <text x="75" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">sent to your inbox</text>
  </g>

  <line x1="210" y1="155" x2="250" y2="155" stroke="#64748b" stroke-width="2" marker-end="url(#ftlArrow)" />

  <g transform="translate(270, 90)">
    <rect width="150" height="130" rx="12" fill="url(#boxGrad)" stroke="#cbd5e1" stroke-width="2" />
    <circle cx="75" cy="30" r="16" fill="#8b5cf6" />
    <text x="75" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">👤</text>
    <text x="75" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a">Complete Profile</text>
    <text x="75" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Add phone, stream</text>
    <text x="75" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">and other details</text>
  </g>

  <line x1="420" y1="155" x2="460" y2="155" stroke="#64748b" stroke-width="2" marker-end="url(#ftlArrow)" />

  <g transform="translate(480, 90)">
    <rect width="150" height="130" rx="12" fill="url(#hlGrad)" stroke="#facc15" stroke-width="2" />
    <circle cx="75" cy="30" r="16" fill="#ca8a04" />
    <text x="75" y="36" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#ffffff">🛡</text>
    <text x="75" y="68" text-anchor="middle" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f172a">Admin Approval</text>
    <text x="75" y="90" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">Library staff review</text>
    <text x="75" y="108" text-anchor="middle" font-family="system-ui, sans-serif" font-size="11" fill="#475569">and activate account</text>
  </g>

  <line x1="630" y1="155" x2="650" y2="155" stroke="#64748b" stroke-width="2" marker-end="url(#ftlArrow)" />

  <g transform="translate(660, 90)">
    <rect width="70" height="130" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2" />
    <text x="35" y="55" text-anchor="middle" font-family="system-ui, sans-serif" font-size="26" fill="#16a34a">🚀</text>
    <text x="35" y="85" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#0f172a">Start</text>
  </g>

  <text x="380" y="280" text-anchor="middle" font-family="system-ui, sans-serif" font-size="12" fill="#64748b">Check your account status anytime from your profile page.</text>
</svg>
