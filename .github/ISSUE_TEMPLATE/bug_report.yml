name: Bug Report
description: Report an error or problem with the documentation.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a documentation issue.
  - type: input
    id: page
    attributes:
      label: Page URL or file path
      description: Link to the affected documentation page or source file.
      placeholder: https://docs.sjrslms.in/getting-started/
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the issue
      description: What is wrong, confusing, or outdated?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Suggested improvement
      description: How should this be corrected or improved?
  - type: checkboxes
    id: terms
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this is not a duplicate.
          required: true
